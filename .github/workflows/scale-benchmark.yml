name: Scale Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  scale-benchmark:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-dependency-paths: native/Cargo.lock
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci
      
      - name: Build Rust native bindings
        run: npm run build:rust

      - name: Build packages
        run: npm run build
      
      - name: Generate massive fixture
        run: node scripts/generate-massive-fixture.mjs --files=1000 --out=test/fixtures/massive-ci
      
      - name: Run massive benchmark
        run: node scripts/benchmark/massive.mjs --root=test/fixtures/massive-ci --out=artifacts/scale/massive-${{ matrix.os }}-node${{ matrix.node }}.json
      
      - name: Run memory profile
        run: node scripts/benchmark/memory-profile.mjs --root=test/fixtures/massive-ci --out=artifacts/scale/memory-${{ matrix.os }}-node${{ matrix.node }}.json
      
      - name: Run watch stability test
        run: node scripts/benchmark/watch-stability.mjs --root=test/fixtures/massive-ci --minutes=1 --touchEvery=5 --reportEvery=10 --out=artifacts/scale/watch-${{ matrix.os }}-node${{ matrix.node }}.json

      - uses: actions/upload-artifact@v4
        with:
          name: scale-benchmark-${{ matrix.os }}-node${{ matrix.node }}
          path: artifacts/scale/*.json
