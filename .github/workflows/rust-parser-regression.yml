name: Rust Parser Regression

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-dependency-paths: native/Cargo.lock
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Rust native bindings
        run: npm run build:rust
      
      - name: Build
        run: npm run build
      
      - name: Run regression tests
        run: node scripts/regression/rust-parser.js
        env:
          TWS_DEBUG_SCANNER: '1'
      
      - uses: actions/upload-artifact@v4
        with:
          name: rust-parser-regression-${{ matrix.os }}-node${{ matrix.node }}
          path: artifacts/regression/*.json
