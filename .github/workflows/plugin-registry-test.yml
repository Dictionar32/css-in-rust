name: Plugin Registry Tests

on:
  push:
    paths:
      - "packages/domain/plugin-registry/**"
      - ".github/workflows/plugin-registry-test.yml"
  pull_request:
    paths:
      - "packages/domain/plugin-registry/**"

jobs:
  test:
    name: Test on ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin-registry
        run: npm run build -w @tailwind-styled/plugin-registry

      - name: Run tests
        run: npm test -w @tailwind-styled/plugin-registry

      - name: Run SLO benchmark
        run: npm run benchmark -w @tailwind-styled/plugin-registry
        continue-on-error: true

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w @tailwind-styled/plugin-registry
      - name: Test CLI — search
        run: node packages/domain/plugin-registry/dist/cli.js search forms || true
      - name: Test CLI — list
        run: node packages/domain/plugin-registry/dist/cli.js list || true
      - name: Test CLI — info
        run: node packages/domain/plugin-registry/dist/cli.js info @tailwind-styled/typography || true
